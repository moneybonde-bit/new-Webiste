<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Luxavian Digital Studio — Premium Web Design &amp; Development</title>
    <meta name="description" content="Luxavian Digital Studio builds elegant, fast, and responsive websites for businesses, churches, organizations, and professionals across Indonesia. Based in Central Sulawesi." />
    <meta name="author" content="Luxavian Digital Studio" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://luxavian.it.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://luxavian.it.com/" />
    <meta property="og:title" content="Luxavian Digital Studio — Premium Web Design &amp; Development" />
    <meta property="og:description" content="Elegant digital solutions: business websites, church websites, wedding invitations, and custom web applications. Serving clients across Indonesia." />
    <meta property="og:image" content="https://luxavian.it.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Luxavian Digital Studio" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="id_ID" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://luxavian.it.com/" />
    <meta name="twitter:title" content="Luxavian Digital Studio — Premium Web Design &amp; Development" />
    <meta name="twitter:description" content="Elegant digital solutions: business websites, church websites, wedding invitations, and custom web applications." />
    <meta name="twitter:image" content="https://luxavian.it.com/og-image.png" />

    <!-- Preload logo (above-the-fold in nav — improves LCP) -->
    <link rel="preload" href="/logo-mark.svg" as="image" type="image/svg+xml" />

    <!-- Fonts: preconnect + async load to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      />
    </noscript>

    <!-- Theme color -->
    <meta name="theme-color" content="#0A0A0A" />

    <!-- Structured data — Local Business -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Luxavian Digital Studio",
      "url": "https://luxavian.it.com",
      "logo": "https://luxavian.it.com/logos/luxavian-logo.png",
      "description": "Premium web design and development for businesses, churches, organizations, and professionals across Indonesia.",
      "address": {
        "@type": "PostalAddress",
        "addressRegion": "Central Sulawesi",
        "addressCountry": "ID"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": ["Indonesian", "English", "Chinese"]
      },
      "sameAs": [
        "https://instagram.com/luxavian.studio"
      ],
      "offers": [
        { "@type": "Offer", "name": "Business Website" },
        { "@type": "Offer", "name": "Digital Wedding Invitation" },
        { "@type": "Offer", "name": "Church Website" },
        { "@type": "Offer", "name": "Property Website" },
        { "@type": "Offer", "name": "Custom Web Application" }
      ]
    }
    </script>
  </head>
  <body>
    <!-- Skip to main content for keyboard/screen-reader users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
