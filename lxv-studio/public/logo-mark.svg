<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Luxavian Digital Studio logo mark">
  <defs>
    <linearGradient id="lx-grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff007f"/>
      <stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <filter id="lx-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2.2" result="blur"/>
      <feFlood flood-color="#ff007f" flood-opacity="0.55" result="pink"/>
      <feComposite in="pink" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded tile -->
  <rect x="1" y="1" width="62" height="62" rx="14" fill="#0A0A0A"/>
  <rect x="1" y="1" width="62" height="62" rx="14" fill="none" stroke="url(#lx-grad)" stroke-opacity="0.35" stroke-width="1.5"/>

  <g filter="url(#lx-glow)">
    <!-- Bold geometric L -->
    <path d="M16 13h10v28h18v10H16Z" fill="url(#lx-grad)"/>
    <!-- x spark, fused top-right -->
    <path d="M36 14l6 6 6-6 5 5-6 6 6 6-5 5-6-6-6 6-5-5 6-6-6-6Z" fill="url(#lx-grad)" fill-opacity="0.9"/>
  </g>
</svg>
